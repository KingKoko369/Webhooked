<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #36393f;
            color: #dcddde;
        }
        .discord-input {
            background-color: #202225;
            border: 1px solid #202225;
            transition: border-color 0.2s;
        }
        .discord-input:focus {
            border-color: #5865f2;
            outline: none;
        }
        .discord-button {
            background-color: #5865f2;
            transition: background-color 0.2s;
        }
        .discord-button:hover {
            background-color: #4752c4;
        }
        .discord-button:disabled {
            background-color: #4f545c;
            cursor: not-allowed;
        }
        .discord-button-secondary {
            background-color: #4f545c;
            transition: background-color 0.2s;
        }
        .discord-button-secondary:hover {
            background-color: #686d73;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#2f3136] rounded-lg shadow-xl p-8 border border-[#202225]">
        <h1 class="text-2xl font-bold text-white mb-2 text-center">Webhook Messenger</h1>
        <p class="text-xs text-[#b9bbbe] text-center mb-6">Authenticated messaging via Discord</p>
        
        <!-- Auth Section -->
        <div id="authSection" class="mb-6 p-4 bg-[#202225] rounded border border-[#5865f2]/30 text-center">
            <div id="loginPrompt">
                <p class="text-sm mb-3">You must be logged in to send messages.</p>
                <button 
                    onclick="loginWithDiscord()" 
                    class="discord-button text-white text-sm font-semibold py-2 px-4 rounded shadow-lg flex items-center justify-center mx-auto"
                >
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/></svg>
                    Login with Discord
                </button>
            </div>
            <div id="userInfo" class="hidden flex items-center justify-between">
                <div class="flex items-center">
                    <img id="userAvatar" class="w-10 h-10 rounded-full mr-3 border border-[#5865f2]">
                    <div class="text-left">
                        <p id="userName" class="text-white font-bold text-sm"></p>
                        <p id="userIdDisplay" class="text-[10px] text-[#72767d]"></p>
                    </div>
                </div>
                <button onclick="logout()" class="text-xs discord-button-secondary py-1 px-3 rounded text-white">Logout</button>
            </div>
        </div>
        
        <div class="space-y-4">
            <!-- Webhook URL Input -->
            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-[#b9bbbe]">Discord Webhook URL</label>
                <input 
                    type="password" 
                    id="webhookUrl" 
                    placeholder="https://discord.com/api/webhooks/..." 
                    class="w-full p-3 rounded discord-input text-white"
                >
            </div>

            <!-- Message Input -->
            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-[#b9bbbe]">Your Message</label>
                <textarea 
                    id="messageContent" 
                    rows="4" 
                    placeholder="Type your message here..." 
                    class="w-full p-3 rounded discord-input text-white resize-none"
                ></textarea>
            </div>

            <!-- Status Display -->
            <div id="statusMessage" class="hidden text-sm p-3 rounded transition-all duration-300"></div>

            <!-- Action Button -->
            <button 
                onclick="sendWebhook()" 
                id="sendBtn"
                disabled
                class="w-full discord-button text-white font-semibold py-3 rounded-md shadow-lg"
            >
                Send Message
            </button>
        </div>

        <p class="mt-6 text-[10px] text-[#72767d] text-center italic">
            Messages will include your user ID tag automatically.
        </p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = '1479022144267616421'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        
        let currentUser = null;

        // On Load: Check for Token in URL fragment
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                fetchDiscordUser(accessToken);
                // Clean URL fragment without refreshing
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                const savedUser = localStorage.getItem('discord_user');
                if (savedUser) {
                    setupUser(JSON.parse(savedUser));
                }
            }
        };

        function loginWithDiscord() {
            // Implicit Grant flow
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        async function fetchDiscordUser(token) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const user = await response.json();
                if (user.id) {
                    setupUser(user);
                    localStorage.setItem('discord_user', JSON.stringify(user));
                }
            } catch (err) {
                showStatus("Failed to fetch Discord user info.", "error");
            }
        }

        function setupUser(user) {
            currentUser = user;
            document.getElementById('loginPrompt').classList.add('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            
            document.getElementById('userName').innerText = user.username;
            document.getElementById('userIdDisplay').innerText = `ID: ${user.id}`;
            document.getElementById('sendBtn').disabled = false;
            
            if (user.avatar) {
                document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            } else {
                document.getElementById('userAvatar').src = `https://cdn.discordapp.com/embed/avatars/0.png`;
            }
        }

        function logout() {
            localStorage.removeItem('discord_user');
            currentUser = null;
            document.getElementById('loginPrompt').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            document.getElementById('sendBtn').disabled = true;
        }

        async function sendWebhook() {
            if (!currentUser) {
                showStatus('Please login first', 'error');
                return;
            }

            const urlInput = document.getElementById('webhookUrl');
            const messageInput = document.getElementById('messageContent');
            const sendBtn = document.getElementById('sendBtn');

            const url = urlInput.value.trim();
            const originalMessage = messageInput.value.trim();

            if (!url) {
                showStatus('Enter a Webhook URL', 'error');
                return;
            }
            if (!originalMessage) {
                showStatus('Enter a message', 'error');
                return;
            }

            // Append the required Footer syntax: -# <@ID>
            const finalMessage = `${originalMessage}\n-# <@${currentUser.id}>`;

            sendBtn.disabled = true;
            sendBtn.innerText = 'Sending...';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: finalMessage })
                });

                if (response.ok) {
                    showStatus('Sent with ID signature!', 'success');
                    messageInput.value = '';
                } else {
                    const err = await response.json();
                    showStatus(`Discord Error: ${err.message || 'Check URL'}`, 'error');
                }
            } catch (error) {
                showStatus('Network error.', 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Send Message';
            }
        }

        function showStatus(text, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'bg-green-500/20', 'text-green-400', 'bg-blue-500/20', 'text-blue-400');
            statusDiv.innerText = text;
            statusDiv.classList.add('block');

            if (type === 'error') statusDiv.classList.add('bg-red-500/20', 'text-red-400');
            else if (type === 'success') {
                statusDiv.classList.add('bg-green-500/20', 'text-green-400');
                setTimeout(() => statusDiv.classList.add('hidden'), 4000);
            } else statusDiv.classList.add('bg-blue-500/20', 'text-blue-400');
        }
    </script>
</body>
</html>
